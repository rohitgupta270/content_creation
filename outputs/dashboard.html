<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #09090b;
            padding: 32px;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 24px;
        }

        .row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card {
            flex: 1;
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card.empty {
            border: none;
            background: transparent;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid #f4f4f5;
        }

        .card-num {
            font-size: 13px;
            font-weight: 700;
            color: #a1a1aa;
            font-variant-numeric: tabular-nums;
        }

        .card-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            min-height: 80px;
        }

        .card-text {
            padding: 12px 14px;
            border-top: 1px solid #f4f4f5;
            flex: 1;
        }

        .post-text {
            font-size: 14px;
            line-height: 1.6;
            font-weight: 450;
            color: #18181b;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 6px;
        }
        .post-text::-webkit-scrollbar { width: 3px; }
        .post-text::-webkit-scrollbar-track { background: transparent; }
        .post-text::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 3px; }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            color: #71717a;
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .copy-btn:hover {
            background: #f4f4f5;
            color: #09090b;
            border-color: #d4d4d8;
        }
        .copy-btn.copied {
            background: #09090b;
            color: #fff;
            border-color: #09090b;
        }

        .no-visual {
            color: #d4d4d8;
            padding: 24px;
        }

        .post-image {
            max-height: 260px;
            max-width: 100%;
            width: auto;
            border-radius: 0;
            object-fit: contain;
        }

        /* Carousel */
        .carousel {
            width: 100%;
        }
        .carousel-stage {
            position: relative;
            overflow: hidden;
            background: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .carousel-slide {
            display: block;
            max-height: 260px;
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
            color: #09090b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            opacity: 0;
            z-index: 2;
        }
        .carousel-stage:hover .carousel-arrow {
            opacity: 1;
        }
        .carousel-arrow:hover {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.16);
        }
        .arrow-left { left: 6px; }
        .arrow-right { right: 6px; }

        .carousel-counter {
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 10px;
            z-index: 2;
            font-variant-numeric: tabular-nums;
        }

        .carousel-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 0;
        }
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 9999px;
            border: none;
            background: #d4d4d8;
            cursor: pointer;
            padding: 0;
            transition: all 0.2s;
        }
        .dot:hover { background: #a1a1aa; }
        .dot.active {
            background: #18181b;
            width: 16px;
        }
    </style>
</head>
<body>
    <h1>Content Dashboard</h1>
    <div class="row">
    <div class="card">
        <div class="card-header">
            <span class="card-num">002</span>
            <button class="copy-btn" onclick="copyText(this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                Copy
            </button>
            <textarea class="hidden-text" style="display:none"></textarea>
        </div>
        <div class="card-visual">
            <span class="no-visual">--</span>
        </div>
        <div class="card-text">
            <div class="post-text"></div>
        </div>
    </div>

<div class="row">
    <div class="card">
        <div class="card-header">
            <span class="card-num">006</span>
            <button class="copy-btn" onclick="copyText(this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                Copy
            </button>
            <textarea class="hidden-text" style="display:none"></textarea>
        </div>
        <div class="card-visual">
            <span class="no-visual">--</span>
        </div>
        <div class="card-text">
            <div class="post-text"></div>
        </div>
    </div>
    <div class="card empty"></div></div>


    <script>
        function copyText(btn) {
            const textarea = btn.nextElementSibling;
            navigator.clipboard.writeText(textarea.value).then(() => {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> Copy';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function carouselNav(carouselId, direction) {
            const slides = document.querySelectorAll('img[data-carousel="' + carouselId + '"]');
            if (slides.length === 0) return;
            let current = 0;
            slides.forEach((s, i) => { if (s.style.display !== 'none') current = i; });
            const next = Math.max(0, Math.min(slides.length - 1, current + direction));
            if (next === current) return;
            carouselGo(carouselId, next);
        }

        function carouselGo(carouselId, index) {
            const slides = document.querySelectorAll('img[data-carousel="' + carouselId + '"]');
            const dots = document.querySelectorAll('button[data-carousel="' + carouselId + '"]');
            const total = slides.length;
            slides.forEach((s, i) => { s.style.display = i === index ? 'block' : 'none'; });
            dots.forEach((d, i) => { d.classList.toggle('active', i === index); });
            document.getElementById(carouselId + '-counter').textContent = (index + 1) + ' / ' + total;
        }
    </script>
